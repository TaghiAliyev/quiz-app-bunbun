<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Quiz Generator</h1>

<div id="setup">
  <input type="file" id="excel" accept=".xlsx" />
  <input type="file" id="pdf" accept=".pdf" />
  <input type="number" id="num" value="30" />
  <button onclick="generateQuiz()">Generate Quiz</button>
</div>

<div id="quiz" style="display:none;">
  <h2 id="questionText"></h2>
  <canvas id="pdfCanvas"></canvas>

  <div id="answers"></div>

  <button id="prevBtn" onclick="prev()">Previous</button>
  <button id="nextBtn" onclick="next()">Next</button>
  <button id="submitBtn" onclick="submitQuiz()" disabled>Submit Quiz</button>
</div>

<div id="result" style="display:none;">
  <h2 id="score"></h2>
</div>

<script src="app.js"></script>
</body>
</html>
